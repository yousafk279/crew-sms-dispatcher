<!DOCTYPE html>
<html>
<head>
    <title>Crew Dispatcher Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; text-align: center; padding: 50px; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 15px; display: inline-block; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #007bff; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; background: #2a2a2a; color: white; border: 1px solid #444; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Crew Dispatcher Pro</h1>
        <form action="/send-alert/" method="post">
            <textarea name="message" placeholder="Enter alert for the team..." required></textarea>
            <button type="submit">SEND SMS BLAST</button>
        </form>
    </div>
</body>
</html>
