<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD-COMMS | Emergency Dispatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .glow-dot { animation: pulse-glow 2s infinite; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617); }
    </style>
</head>
<body class="text-slate-200 font-mono min-h-screen flex flex-col items-center py-12 px-4">

    <div class="w-full max-w-2xl flex justify-between items-center mb-8 px-2">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-emerald-500 rounded-full glow-dot shadow-[0_0_10px_#10b981]"></div>
            <h2 class="text-xs uppercase tracking-[0.3em] font-bold text-emerald-500">System Link Active</h2>
        </div>
        <div class="text-[10px] text-slate-500 uppercase tracking-widest">Secure Node: HF-SPACE-279</div>
    </div>

    <div class="w-full max-w-2xl glass rounded-2xl overflow-hidden shadow-2xl">
        <div class="bg-white/5 px-6 py-4 border-b border-white/10 flex justify-between items-center">
            <h1 class="text-lg font-black tracking-tighter text-white">SQUAD <span class="text-blue-500">COMMS</span> <span class="text-slate-500 font-light text-sm italic">v2.0</span></h1>
            <div class="px-3 py-1 rounded bg-blue-500/10 border border-blue-500/20 text-[10px] text-blue-400 font-bold uppercase">Demo Protocol</div>
        </div>

        <div class="p-8">
            <form id="smsForm" class="space-y-6">
                <div class="relative">
                    <label class="text-[10px] uppercase text-slate-500 mb-2 block font-bold tracking-widest">Identity Authentication</label>
                    <input type="password" name="pin" placeholder="ENTER 4-DIGIT PIN" 
                        class="w-full bg-slate-900/50 border border-slate-700 p-4 rounded-lg focus:ring-2 focus:ring-blue-500/50 outline-none transition-all placeholder:text-slate-700 text-center tracking-[1em] text-xl font-bold">
                </div>

                <div>
                    <label class="text-[10px] uppercase text-slate-500 mb-2 block font-bold tracking-widest">Broadcast Payload</label>
                    <textarea name="alert" placeholder="INITIATE MESSAGE SEQUENCE..." 
                        class="w-full bg-slate-900/50 border border-slate-700 p-4 rounded-lg h-32 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all placeholder:text-slate-700 resize-none"></textarea>
                </div>

                <button type="submit" id="btn" 
                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-black py-5 rounded-lg transition-all transform active:scale-[0.98] shadow-[0_0_20px_rgba(37,99,235,0.3)] uppercase tracking-widest">
                    Execute Dispatch
                </button>
            </form>
            
            <div id="status" class="mt-6 text-center text-xs font-bold uppercase tracking-widest italic min-h-[1em]"></div>
        </div>
    </div>

    <div class="w-full max-w-2xl mt-10">
        <div class="flex items-center gap-2 mb-4 opacity-50">
            <div class="h-[1px] flex-grow bg-slate-700"></div>
            <span class="text-[10px] font-bold uppercase tracking-[0.2em]">Transmission Logs</span>
            <div class="h-[1px] flex-grow bg-slate-700"></div>
        </div>
        
        <div id="history" class="space-y-3">
            </div>
    </div>

    <script>
        const form = document.getElementById('smsForm');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "UPLOADING TO SATELLITE...";
            status.innerText = "";

            const res = await fetch('/send_sms', { method: 'POST', body: new FormData(form) });
            const data = await res.json();
            
            status.innerText = data.message;
            status.className = data.status === "Error" ? "mt-6 text-center text-xs font-bold uppercase tracking-widest italic text-red-500" : "mt-6 text-center text-xs font-bold uppercase tracking-widest italic text-emerald-400";
            
            btn.disabled = false;
            btn.innerText = "Execute Dispatch";
            if(data.status !== "Error") { form.reset(); loadHistory(); }
        };

        async function loadHistory() {
            const res = await fetch('/history');
            const data = await res.json();
            document.getElementById('history').innerHTML = data.map(i => `
                <div class="glass p-4 rounded-lg flex justify-between items-start group hover:border-blue-500/50 transition-all">
                    <div>
                        <p class="text-sm text-slate-300 leading-relaxed">${i.message}</p>
                        <p class="text-[9px] text-slate-600 mt-2 font-bold uppercase tracking-tighter italic">Sequence Verified: ${i.time}</p>
                    </div>
                    <div class="text-blue-500/30 font-black text-xl italic group-hover:text-blue-500 transition-colors">>></div>
                </div>
            `).join('');
        }
        loadHistory();
    </script>
</body>
</html>
