<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD-COMMS | Dispatch Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .glow-dot { animation: pulse-glow 2s infinite; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617); }
    </style>
</head>
<body class="text-slate-200 font-mono min-h-screen flex flex-col items-center py-12 px-4">

    <div class="w-full max-w-2xl flex justify-between items-center mb-8 px-2">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-emerald-500 rounded-full glow-dot shadow-[0_0_10px_#10b981]"></div>
            <h2 class="text-xs uppercase tracking-[0.3em] font-bold text-emerald-500">System Link Active</h2>
        </div>
        <a href="/export" class="text-[10px] bg-blue-900/30 border border-blue-500/30 hover:bg-blue-500/20 px-3 py-1 rounded text-blue-400 transition font-bold tracking-widest">
            ↓ EXPORT LOGS (.CSV)
        </a>
    </div>

    <div class="w-full max-w-2xl glass rounded-2xl overflow-hidden shadow-2xl">
        <div class="bg-white/5 px-6 py-4 border-b border-white/10 flex justify-between items-center">
            <h1 class="text-lg font-black tracking-tighter text-white">SQUAD <span class="text-blue-500">COMMS</span></h1>
            <div class="px-3 py-1 rounded bg-blue-500/10 border border-blue-500/20 text-[10px] text-blue-400 font-bold uppercase">Demo Protocol</div>
        </div>

        <div class="p-8">
            <form id="smsForm" class="space-y-6">
                <input type="password" name="pin" placeholder="ENTER PIN (1234)" class="w-full bg-slate-900/50 border border-slate-700 p-4 rounded-lg focus:ring-2 focus:ring-blue-500/50 outline-none text-center tracking-[1em] text-xl font-bold">
                <textarea name="alert" placeholder="MESSAGE SEQUENCE..." class="w-full bg-slate-900/50 border border-slate-700 p-4 rounded-lg h-32 focus:ring-2 focus:ring-blue-500/50 outline-none resize-none"></textarea>
                <button type="submit" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-lg transition-all shadow-lg uppercase tracking-widest">Execute Dispatch</button>
            </form>
            <div id="status" class="mt-6 text-center text-xs font-bold uppercase tracking-widest italic text-emerald-400"></div>
        </div>
    </div>

    <div class="w-full max-w-2xl mt-10">
        <div id="history" class="space-y-3"></div>
    </div>

    <script>
        const form = document.getElementById('smsForm');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true; btn.innerText = "UPLOADING...";
            const res = await fetch('/send_sms', { method: 'POST', body: new FormData(form) });
            const data = await res.json();
            status.innerText = data.message;
            btn.disabled = false; btn.innerText = "Execute Dispatch";
            if(data.status !== "Error") { form.reset(); loadHistory(); }
        };

        async function loadHistory() {
            const res = await fetch('/history');
            const data = await res.json();
            document.getElementById('history').innerHTML = data.map(i => `
                <div class="glass p-4 rounded-lg flex justify-between items-start">
                    <div><p class="text-sm text-slate-300">${i.message}</p><p class="text-[9px] text-slate-600 mt-2 uppercase italic">${i.time}</p></div>
                    <div class="text-blue-500/30 font-black text-xl italic">>></div>
                </div>
            `).join('');
        }
        loadHistory();
    </script>
</body>
</html>
