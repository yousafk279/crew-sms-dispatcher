<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Dispatcher | Portfolio Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center py-10">
    
    <div class="w-full max-w-md bg-slate-800 rounded-xl shadow-2xl p-8 border border-slate-700">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-blue-400">Crew Dispatch</h1>
            <span class="bg-blue-900 text-blue-200 text-xs px-2 py-1 rounded-full uppercase tracking-wider">Demo Mode</span>
        </div>

        <p class="text-slate-400 text-sm mb-6">Enter PIN 1234 to test the database logging and API simulation.</p>

        <form id="smsForm" class="space-y-4">
            <input type="password" name="pin" placeholder="Admin PIN (1234)" class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:border-blue-500 outline-none transition" required>
            <textarea name="alert" placeholder="Broadcast message..." class="w-full p-3 rounded bg-slate-700 border border-slate-600 h-24 focus:border-blue-500 outline-none transition" required></textarea>
            <button type="submit" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded transition duration-200 shadow-lg">AUTHORIZE & DISPATCH</button>
        </form>
        
        <div id="status" class="mt-4 text-center text-sm font-medium"></div>
    </div>

    <div class="w-full max-w-md mt-8">
        <h3 class="text-slate-500 uppercase text-xs font-bold mb-4 tracking-widest">Live Alert History (SQLite)</h3>
        <div id="history" class="space-y-2"></div>
    </div>

    <script>
        const form = document.getElementById('smsForm');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "PROCESSING...";
            status.innerText = "";

            const res = await fetch('/send_sms', { method: 'POST', body: new FormData(form) });
            const data = await res.json();
            
            status.innerText = data.message;
            status.className = data.status === "Error" ? "mt-4 text-red-400" : "mt-4 text-green-400";
            
            btn.disabled = false;
            btn.innerText = "AUTHORIZE & DISPATCH";
            if(data.status !== "Error") { form.reset(); loadHistory(); }
        };

        async function loadHistory() {
            const res = await fetch('/history');
            const data = await res.json();
            document.getElementById('history').innerHTML = data.map(i => `
                <div class="bg-slate-800 p-3 rounded border-l-4 border-blue-500 text-sm">
                    <p class="text-slate-200">${i.message}</p>
                    <p class="text-slate-500 text-[10px] mt-1">${new Date(i.time).toLocaleTimeString()}</p>
                </div>
            `).join('');
        }
        loadHistory();
    </script>
</body>
</html>
