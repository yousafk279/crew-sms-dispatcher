<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Dispatcher Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; }
        .container { background-color: #1e1e1e; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 100%; max-width: 500px; text-align: center; margin-bottom: 20px; }
        h1 { color: #3b82f6; margin-bottom: 1.5rem; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #333; border-radius: 8px; background-color: #2a2a2a; color: #fff; font-size: 1rem; margin-bottom: 1.5rem; resize: none; box-sizing: border-box; }
        button { background-color: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background-color 0.2s; width: 100%; }
        button:hover { background-color: #2563eb; }
        #history-section { width: 100%; max-width: 500px; background-color: #1e1e1e; padding: 1rem; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #333; font-size: 0.9rem; }
        th { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Crew Dispatcher Pro</h1>
        <form id="smsForm">
            <textarea name="alert" id="alertText" placeholder="Enter alert for the team..." required></textarea>
            <button type="submit">SEND SMS BLAST</button>
        </form>
    </div>

    <div id="history-section">
        <h3>Recent Alerts</h3>
        <table>
            <thead>
                <tr>
                    <th>Message</th>
                    <th>Sent At</th>
                </tr>
            </thead>
            <tbody id="history-body">
                </tbody>
        </table>
    </div>

    <script>
        // Handle form submission
        document.getElementById('smsForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/send_sms', { method: 'POST', body: formData });
            const result = await response.json();
            alert(result.message);
            loadHistory(); // Refresh table after sending
        };

        // Fetch and display history
        async function loadHistory() {
            try {
                const response = await fetch('/history');
                const data = await response.json();
                const body = document.getElementById('history-body');
                body.innerHTML = data.map(item => `
                    <tr>
                        <td>${item.message}</td>
                        <td>${new Date(item.time).toLocaleString()}</td>
                    </tr>
                `).join('');
            } catch (e) { console.error("Error loading history", e); }
        }

        // Load history on page load
        loadHistory();
    </script>
</body>
</html>
